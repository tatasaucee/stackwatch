<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STACKWATCH — Personal Live News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0E12;
    --panel:#10161C;
    --panel-2:#0D1218;
    --border:#1E2A33;
    --text:#E7EDF2;
    --muted:#7C8B96;
    --dim:#4B5A64;
    --amber:#F5A623;
    --red:#E2483D;
    --blue:#4C8BF5;
    --green:#3ECF8E;
    --teal:#2DD4BF;
    --purple:#9B6BFF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);}
  body{
    font-family:'IBM Plex Sans',sans-serif;
    min-height:100vh;
    background-image:
      radial-gradient(circle at 15% 0%, rgba(76,139,245,0.06), transparent 40%),
      radial-gradient(circle at 85% 0%, rgba(226,72,61,0.06), transparent 40%);
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;}

  header{
    border-bottom:1px solid var(--border);
    padding:16px 20px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--green);
    box-shadow:0 0 0 0 rgba(62,207,142,0.6);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(62,207,142,0.5);}
    70%{box-shadow:0 0 0 8px rgba(62,207,142,0);}
    100%{box-shadow:0 0 0 0 rgba(62,207,142,0);}
  }
  .brand h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:19px;
    font-weight:700;
    letter-spacing:0.5px;
    margin:0;
  }
  .brand h1 span{color:var(--amber);}
  .status-cluster{display:flex;align-items:center;gap:16px;font-size:11px;color:var(--muted);flex-wrap:wrap;}
  .status-cluster .stat{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
  .status-cluster .stat b{color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;}
  #refreshBtn{
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text);
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    padding:8px 12px;
    border-radius:4px;
    cursor:pointer;
    letter-spacing:0.5px;
    transition:border-color .15s ease;
  }
  #refreshBtn:hover{border-color:var(--amber);}
  #refreshBtn:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}

  .ticker-wrap{
    border-bottom:1px solid var(--border);
    background:var(--panel-2);
    overflow:hidden;
    white-space:nowrap;
    position:relative;
    height:32px;
    display:flex;
    align-items:center;
  }
  .ticker-label{
    flex:0 0 auto;
    background:var(--amber);
    color:#141414;
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    font-size:10px;
    letter-spacing:1px;
    padding:0 12px;
    height:100%;
    display:flex;
    align-items:center;
    z-index:2;
  }
  .ticker-track{
    display:inline-flex;
    animation:scroll-left 55s linear infinite;
    padding-left:100%;
  }
  .ticker-track:hover{animation-play-state:paused;}
  @keyframes scroll-left{
    from{transform:translateX(0);}
    to{transform:translateX(-100%);}
  }
  .ticker-item{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--muted);
    padding:0 22px;
    display:inline-flex;
    align-items:center;
    gap:7px;
  }
  .ticker-item .tag{font-weight:600;}
  .ticker-item a{text-decoration:none;color:var(--text);}
  .ticker-item a:hover{color:var(--amber);}

  /* ===== TABS ===== */
  .tab-bar{
    display:flex;
    gap:6px;
    padding:12px 16px;
    overflow-x:auto;
    border-bottom:1px solid var(--border);
    -webkit-overflow-scrolling:touch;
  }
  .tab-bar::-webkit-scrollbar{display:none;}
  .tab-btn{
    flex:0 0 auto;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    padding:9px 14px;
    border-radius:20px;
    border:1px solid var(--border);
    background:var(--panel);
    color:var(--muted);
    cursor:pointer;
    white-space:nowrap;
    display:flex;
    align-items:center;
    gap:6px;
    transition:all .15s ease;
  }
  .tab-btn:hover{color:var(--text);border-color:var(--muted);}
  .tab-btn .swatch{width:7px;height:7px;border-radius:50%;flex:0 0 auto;}
  .tab-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);}
  .tab-btn.active .swatch{background:var(--bg) !important;}

  .search-row{
    padding:0 16px 12px;
    display:flex;
  }
  input#keywordFilter{
    width:100%;
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text);
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    padding:9px 12px;
    border-radius:4px;
  }
  input#keywordFilter:focus-visible{outline:2px solid var(--amber);outline-offset:1px;}

  /* ===== PANEL ===== */
  .panel-head{
    padding:6px 20px 14px;
  }
  .panel-head .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    letter-spacing:2px;
    text-transform:uppercase;
  }
  .panel-head h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:20px;
    margin:4px 0 2px;
  }
  .panel-head .desc{font-size:12px;color:var(--muted);}

  .feed{
    padding:6px 16px 50px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(300px,1fr));
    gap:10px;
    align-content:start;
  }

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:6px;
    padding:13px 15px;
    text-decoration:none;
    color:var(--text);
    display:block;
    transition:border-color .15s ease, transform .1s ease;
  }
  .card:hover{border-color:var(--muted);transform:translateY(-1px);}
  .card:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
  .card .meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    color:var(--dim);
    margin-bottom:6px;
    letter-spacing:0.3px;
    text-transform:uppercase;
    gap:8px;
  }
  .card .meta .origin{font-weight:600;}
  .card .headline{font-size:13.5px;line-height:1.4;font-weight:500;margin:0;}
  .card .snippet{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

  .empty, .loading, .err{
    color:var(--dim);
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    padding:40px 4px;
    text-align:center;
    grid-column:1 / -1;
  }
  .err{color:var(--red);}

  footer{
    border-top:1px solid var(--border);
    padding:16px 20px 26px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:var(--dim);
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }

  @media (prefers-reduced-motion: reduce){
    .ticker-track{animation:none;}
    .brand .dot{animation:none;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="dot"></span>
    <div>
      <h1>STACK<span>WATCH</span></h1>
    </div>
  </div>
  <div class="status-cluster">
    <div class="stat"><span>Time</span><b id="clock" class="mono">--:--:--</b></div>
    <div class="stat"><span>Next sync</span><b id="countdown" class="mono">--</b></div>
    <div class="stat"><span>Source</span><b id="dataSource" class="mono">checking…</b></div>
    <button id="refreshBtn" class="mono">⟳ SYNC</button>
  </div>
</header>

<div class="ticker-wrap">
  <div class="ticker-label">LIVE</div>
  <div class="ticker-track" id="tickerTrack">
    <span class="ticker-item">Loading latest signals…</span>
  </div>
</div>

<div class="tab-bar" id="tabBar"></div>

<div class="search-row">
  <input id="keywordFilter" class="mono" type="text" placeholder="search within this tab…">
</div>

<div class="panel-head">
  <div class="eyebrow mono" id="panelEyebrow"></div>
  <h2 id="panelTitle"></h2>
  <div class="desc" id="panelDesc"></div>
</div>

<div class="feed" id="feed"><div class="loading">Tuning in…</div></div>

<footer>
  <span>Sources: static feed from GitHub Actions, with live Google News RSS fallback in-browser.</span>
  <span>Edit <span class="mono">CATEGORIES</span> in the page source to change what each tab tracks.</span>
</footer>

<script>
/* ============================================================
   CONFIG
   ============================================================ */

const RSS2JSON_KEY = ""; // optional, get one free at https://rss2json.com/
const REFRESH_MS = 60 * 60 * 1000; // 1 hour, matches the server-side schedule
const ITEMS_PER_TAB = 20;
const HOT_ITEMS = 24; // how many items the Hot News tab pulls together

// Each tab (except "hot", which is derived automatically) = search queries.
const CATEGORIES = {
  sg: {
    label: "Singapore",
    emoji: "🇸🇬",
    color: "var(--teal)",
    desc: "Local news, economy, everyday happenings",
    queries: ["Singapore news"],
  },
  china: {
    label: "China",
    emoji: "🇨🇳",
    color: "var(--red)",
    desc: "China tech, policy, Huawei, semiconductors",
    queries: ["China technology policy", "Huawei", "China semiconductor"],
  },
  politics: {
    label: "Politics",
    emoji: "🏛️",
    color: "var(--purple)",
    desc: "Global politics and geopolitics",
    queries: ["world politics", "geopolitics"],
  },
  usworld: {
    label: "US & World",
    emoji: "🇺🇸",
    color: "var(--blue)",
    desc: "US news and major world headlines",
    queries: ["United States news", "world news today"],
  },
  companies: {
    label: "Rising Companies",
    emoji: "🚀",
    color: "var(--green)",
    desc: "Startups, funding, fast-growing companies worldwide",
    queries: ["startup funding"],
  },
};

const TAB_ORDER = ["hot", "sg", "china", "politics", "usworld", "companies"];
const HOT_TAB = { label: "Hot News", emoji: "🔥", color: "var(--amber)", desc: "Most recent across every tab, combined" };

/* ============================================================
   ENGINE
   ============================================================ */

function googleNewsRssUrl(query) {
  const q = encodeURIComponent(query);
  return `https://news.google.com/rss/search?q=${q}&hl=en-US&gl=US&ceid=US:en`;
}

async function fetchFeed(rssUrl) {
  const proxied = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}${RSS2JSON_KEY ? "&api_key=" + RSS2JSON_KEY : ""}`;
  const res = await fetch(proxied);
  if (!res.ok) throw new Error("Feed request failed: " + res.status);
  const data = await res.json();
  if (data.status !== "ok") throw new Error("Feed error: " + (data.message || "unknown"));
  return data.items || [];
}

function timeAgo(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  const diffMs = Date.now() - d.getTime();
  const mins = Math.round(diffMs / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return mins + "m ago";
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return hrs + "h ago";
  const days = Math.round(hrs / 24);
  return days + "d ago";
}

function stripHtml(html) {
  const tmp = document.createElement("div");
  tmp.innerHTML = html || "";
  return (tmp.textContent || tmp.innerText || "").trim();
}

function sourceFromTitle(title) {
  const parts = (title || "").split(" - ");
  if (parts.length > 1) {
    return { headline: parts.slice(0, -1).join(" - "), source: parts[parts.length - 1] };
  }
  return { headline: title || "", source: "" };
}

let ALL_ITEMS = {}; // key -> array of {title, link, pubDate, description}
Object.keys(CATEGORIES).forEach(k => ALL_ITEMS[k] = []);

let activeTab = "hot";
let currentKeyword = "";

async function loadCategoryLive(key) {
  const cat = CATEGORIES[key];
  try {
    const results = await Promise.all(cat.queries.map(q => fetchFeed(googleNewsRssUrl(q)).catch(() => [])));
    const merged = results.flat();
    const seen = new Set();
    const deduped = [];
    for (const item of merged) {
      if (!item.link || seen.has(item.link)) continue;
      seen.add(item.link);
      deduped.push({ title: item.title, link: item.link, pubDate: item.pubDate, description: item.description });
    }
    deduped.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
    ALL_ITEMS[key] = deduped.slice(0, ITEMS_PER_TAB);
  } catch (e) {
    ALL_ITEMS[key] = [];
  }
}

function getHotItems() {
  const all = [];
  Object.keys(CATEGORIES).forEach(key => {
    ALL_ITEMS[key].forEach(item => all.push({ ...item, originKey: key }));
  });
  all.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
  // de-dupe across categories by link
  const seen = new Set();
  const out = [];
  for (const item of all) {
    if (!item.link || seen.has(item.link)) continue;
    seen.add(item.link);
    out.push(item);
    if (out.length >= HOT_ITEMS) break;
  }
  return out;
}

function matchesKeyword(item) {
  if (!currentKeyword) return true;
  const text = (item.title + " " + (item.description || "")).toLowerCase();
  return text.includes(currentKeyword.toLowerCase());
}

function renderTabBar() {
  const bar = document.getElementById("tabBar");
  bar.innerHTML = TAB_ORDER.map(key => {
    const cat = key === "hot" ? HOT_TAB : CATEGORIES[key];
    return `<button class="tab-btn ${key === activeTab ? "active" : ""}" data-tab="${key}">
      <span class="swatch" style="background:${cat.color}"></span>${cat.emoji} ${cat.label}
    </button>`;
  }).join("");
  bar.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      activeTab = btn.dataset.tab;
      renderTabBar();
      renderPanel();
    });
  });
}

function renderPanel() {
  const cat = activeTab === "hot" ? HOT_TAB : CATEGORIES[activeTab];
  document.getElementById("panelEyebrow").textContent = activeTab === "hot" ? "TRENDING" : activeTab.toUpperCase();
  document.getElementById("panelEyebrow").style.color = cat.color;
  document.getElementById("panelTitle").textContent = `${cat.emoji} ${cat.label}`;
  document.getElementById("panelTitle").style.color = cat.color;
  document.getElementById("panelDesc").textContent = cat.desc;

  const feedEl = document.getElementById("feed");
  const items = (activeTab === "hot" ? getHotItems() : ALL_ITEMS[activeTab]).filter(matchesKeyword);

  if (!items.length) {
    feedEl.innerHTML = `<div class="empty">No signals here right now. Try Sync, or clear the search.</div>`;
    return;
  }

  feedEl.innerHTML = items.map(item => {
    const { headline, source } = sourceFromTitle(item.title);
    const snippet = stripHtml(item.description).slice(0, 160);
    const originCat = item.originKey ? CATEGORIES[item.originKey] : null;
    return `
      <a class="card" href="${item.link}" target="_blank" rel="noopener noreferrer">
        <div class="meta">
          <span>${source || "source"}</span>
          ${originCat ? `<span class="origin" style="color:${originCat.color}">${originCat.emoji} ${originCat.label}</span>` : ""}
          <span>${timeAgo(item.pubDate)}</span>
        </div>
        <p class="headline">${headline}</p>
        ${snippet ? `<div class="snippet">${snippet}</div>` : ""}
      </a>
    `;
  }).join("");
}

function renderTicker() {
  const track = document.getElementById("tickerTrack");
  const hot = getHotItems().slice(0, 14);
  if (!hot.length) {
    track.innerHTML = `<span class="ticker-item">No live signals yet — hit Sync, or check back shortly.</span>`;
    return;
  }
  track.innerHTML = hot.map(item => {
    const { headline } = sourceFromTitle(item.title);
    const cat = CATEGORIES[item.originKey];
    return `<span class="ticker-item"><span class="tag" style="color:${cat ? cat.color : "var(--amber)"}">${cat ? cat.emoji : "🔥"}</span><a href="${item.link}" target="_blank" rel="noopener noreferrer">${headline}</a></span>`;
  }).join("");
}

async function tryLoadStaticData() {
  try {
    const res = await fetch("./data/news.json", { cache: "no-store" });
    if (!res.ok) return false;
    const data = await res.json();
    if (!data.categories) return false;
    Object.keys(CATEGORIES).forEach(key => {
      const items = data.categories[key] || [];
      ALL_ITEMS[key] = items.map(item => ({
        title: item.source ? `${item.title} - ${item.source}` : item.title,
        link: item.link,
        pubDate: item.pubDate,
        description: item.description || "",
      })).slice(0, ITEMS_PER_TAB);
    });
    document.getElementById("dataSource").textContent = `static · ${timeAgo(data.generated_at)}`;
    return true;
  } catch (e) {
    return false;
  }
}

async function refreshAll() {
  document.getElementById("refreshBtn").textContent = "⟳ SYNCING…";
  const usedStatic = await tryLoadStaticData();
  if (!usedStatic) {
    document.getElementById("dataSource").textContent = "live (fallback)";
    await Promise.all(Object.keys(CATEGORIES).map(loadCategoryLive));
  }
  renderPanel();
  renderTicker();
  document.getElementById("refreshBtn").textContent = "⟳ SYNC";
  lastRefresh = Date.now();
}

function tickClock() {
  document.getElementById("clock").textContent = new Date().toLocaleTimeString();
}

let lastRefresh = Date.now();
function tickCountdown() {
  const remaining = Math.max(0, REFRESH_MS - (Date.now() - lastRefresh));
  const s = Math.floor(remaining / 1000);
  const mm = String(Math.floor(s / 60)).padStart(2, "0");
  const ss = String(s % 60).padStart(2, "0");
  document.getElementById("countdown").textContent = `${mm}:${ss}`;
  if (remaining <= 0) refreshAll();
}

document.getElementById("keywordFilter").addEventListener("input", (e) => {
  currentKeyword = e.target.value;
  renderPanel();
});

document.getElementById("refreshBtn").addEventListener("click", refreshAll);

renderTabBar();
setInterval(tickClock, 1000);
setInterval(tickCountdown, 1000);
tickClock();

refreshAll();
</script>

</body>
</html>
