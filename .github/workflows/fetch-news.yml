name: Fetch News

on:
  schedule:
    # Runs once an hour, 9am-6pm Singapore time (UTC+8) = 01:00-10:00 UTC.
    # 10 runs/day x 9 requests/run = 90 requests/day, under the 100/day free limit.
    - cron: "0 1-10 * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest news
        run: python scripts/fetch_news.py
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

      - name: Commit updated data
        run: |
          git config user.name "stackwatch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/news.json
          git diff --staged --quiet || git commit -m "Update news data [skip ci]"
          git push
